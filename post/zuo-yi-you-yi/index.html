            <div class="post-content">
              <pre><code>Z &gt;&gt; n
n &lt;&lt; Z
</code></pre>
<p>右移n位可以定义为除以<code>pow(2,n)</code>，左移n位可以定义为乘以<code>pow(2,n)</code>。但此结论只适用于该数左移时被溢出舍弃的高位中不包含1的情况。</p>
